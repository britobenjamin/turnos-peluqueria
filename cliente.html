<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peluquería - Mis Turnos</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="contenedor turnos-contenedor">

    <div class="turnos-header">
      <h1>✂️ Hola, <span id="nombre-usuario"></span></h1>
      <button onclick="cerrarSesion()">Cerrar sesión</button>
    </div>

    <h2>Sacar un turno</h2>

    <div class="form-turno">
      <input type="date" id="turno-fecha">
      <input type="time" id="turno-hora">
      <input type="tel" id="turno-telefono" placeholder="Teléfono de contacto">
      <button onclick="agregarTurno()">Confirmar turno</button>
    </div>

    <p id="mensaje-turno"></p>

    <h2>Mis turnos reservados</h2>
    <ul id="lista-turnos">
      <li class="sin-turnos">No tenés turnos reservados todavía.</li>
    </ul>

  </div>

  <script src="cliente.js"></script>
</body>
</html>
